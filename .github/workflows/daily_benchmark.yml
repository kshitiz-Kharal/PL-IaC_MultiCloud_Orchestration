# daily_benchmark.yml
# Runs one benchmark cycle per day at a randomised time (midnight UTC ± 4 h).
# Results are appended to data/exp1_steady_state_YYYY-MM-DD.csv and committed
# back to the repository after each run.
#
# ── Required GitHub Secrets ───────────────────────────────────────────────────
#   AWS_ACCESS_KEY_ID          IAM user with EC2 + VPN full-access
#   AWS_SECRET_ACCESS_KEY
#   ARM_SUBSCRIPTION_ID        Azure subscription
#   ARM_TENANT_ID
#   ARM_CLIENT_ID              Service principal (Contributor on subscription)
#   ARM_CLIENT_SECRET
#   AZURE_VM_PASSWORD          Password for the test VM (min 12 chars, uppercase,
#                              number, symbol — Azure complexity rules)
#
# ── One-time Azure setup ──────────────────────────────────────────────────────
#   az ad sp create-for-rbac \
#     --name "github-actions-orchestrator" \
#     --role Contributor \
#     --scopes /subscriptions/<subscription-id>
#   (outputs clientId, clientSecret, tenantId — store as secrets above)
#
# ── Manual stop ───────────────────────────────────────────────────────────────
#   GitHub → Actions → daily_benchmark → "..." → Disable workflow
# ─────────────────────────────────────────────────────────────────────────────

name: Daily Benchmark (1 cycle)

on:
  schedule:
    - cron: '0 0 * * *'   # midnight UTC every day; random offset added below
  workflow_dispatch:        # allows manual trigger from the Actions UI

permissions:
  contents: write           # needed to commit data/ back to the repo

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 300    # 5 h max — VPN Gateway takes 25-45 min per cycle

    steps:
      # ── Random delay so runs are spread across the day ─────────────────────
      - name: Random start offset (0–4 hours)
        run: |
          DELAY=$((RANDOM % 14400))
          echo "Sleeping ${DELAY}s before starting..."
          sleep $DELAY

      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Toolchain setup ────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~1.5'

      - name: Install Azure CLI
        run: curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── Cloud authentication ───────────────────────────────────────────────
      - name: Azure CLI login
        run: |
          az login --service-principal \
            --username "$ARM_CLIENT_ID" \
            --password "$ARM_CLIENT_SECRET" \
            --tenant   "$ARM_TENANT_ID"
          az account set --subscription "$ARM_SUBSCRIPTION_ID"
        env:
          ARM_CLIENT_ID:       ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET:   ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_TENANT_ID:       ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      # ── Accept Windows 11 marketplace terms (idempotent, safe to re-run) ──
      - name: Accept Windows 11 marketplace image terms
        run: |
          az vm image terms accept \
            --publisher MicrosoftWindowsDesktop \
            --offer Windows-11 \
            --plan win11-24h2-pro
        env:
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      # ── Run one benchmark cycle ────────────────────────────────────────────
      - name: Run benchmark (1 cycle)
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    ap-southeast-2
          ARM_SUBSCRIPTION_ID:   ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID:         ${{ secrets.ARM_TENANT_ID }}
          ARM_CLIENT_ID:         ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET:     ${{ secrets.ARM_CLIENT_SECRET }}
          AZURE_VM_PASSWORD:     ${{ secrets.AZURE_VM_PASSWORD }}
        run: python benchmark.py --cycles 1

      # ── Commit results ─────────────────────────────────────────────────────
      - name: Commit benchmark data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Only commit if there are actual changes (handles no-op gracefully)
          git diff --staged --quiet || \
            git commit -m "data: benchmark cycle $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
          git push

      # ── Emergency teardown (only runs if the benchmark step failed) ────────
      - name: Emergency destroy
        if: failure()
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    ap-southeast-2
          ARM_SUBSCRIPTION_ID:   ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID:         ${{ secrets.ARM_TENANT_ID }}
          ARM_CLIENT_ID:         ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET:     ${{ secrets.ARM_CLIENT_SECRET }}
          AZURE_VM_PASSWORD:     ${{ secrets.AZURE_VM_PASSWORD }}
        run: |
          echo "Benchmark failed — running emergency destroy to avoid orphaned resources"
          python orchestrator.py --destroy || true
