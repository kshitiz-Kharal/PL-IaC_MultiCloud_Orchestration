name: Fault Injection — 3 cycles twice daily (Exp 2)

# Two triggers per day → 6 inject cycles/day → n=27 (3 passes) in ~3 days.
#
# 09:00 UTC: safely after benchmark-daily (02:00 UTC + max 2h sleep + 33min = done by 04:33)
# 21:00 UTC: safely after benchmark-night (17:00 UTC + max 2h sleep + 33min = done by 19:33)
#
# No random sleep — fault injection timing does not affect blast-radius measurements.
# Self-skips once 27 cycles are in the repo (3 passes × 9 faults).
on:
  schedule:
    - cron: '0 9 * * *'
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION:    ap-southeast-2
  ARM_SUBSCRIPTION_ID:   ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_CLIENT_ID:         ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET:     ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_TENANT_ID:         ${{ secrets.ARM_TENANT_ID }}
  AZURE_VM_PASSWORD:     ${{ secrets.AZURE_VM_PASSWORD }}

jobs:
  inject:
    name: Fault injection cycle
    runs-on: ubuntu-latest
    timeout-minutes: 360    # 3 cycles × ~70 min each + setup/teardown overhead

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      # ── Check how many inject cycles are already in the repo ──────────────
      - name: Count existing cycles
        id: count
        run: |
          DONE=$(python3 - <<'EOF'
          import glob
          files = glob.glob("data/exp2_fault_injection_*.csv")
          total = sum(max(0, sum(1 for _ in open(f)) - 1) for f in files)
          print(total)
          EOF
          )
          echo "done=$DONE" >> "$GITHUB_OUTPUT"
          echo "Fault-injection cycles already collected: $DONE / 27"

      - name: Skip if target reached
        if: steps.count.outputs.done >= 27
        run: |
          echo "27 fault-injection cycles already collected (3 passes, all faults covered). Nothing to do."
          exit 0

      # ── Tool setup ────────────────────────────────────────────────────────
      - uses: hashicorp/setup-terraform@v3.1.2
        if: steps.count.outputs.done < 27
        with:
          terraform_version: "~1.9"

      - uses: actions/setup-python@v5.3.0
        if: steps.count.outputs.done < 27
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        if: steps.count.outputs.done < 27
        run: pip install -r requirements.txt

      - name: Azure CLI login
        if: steps.count.outputs.done < 27
        run: |
          az login --service-principal \
            -u "$ARM_CLIENT_ID" \
            -p "$ARM_CLIENT_SECRET" \
            --tenant "$ARM_TENANT_ID"

      - name: terraform init
        if: steps.count.outputs.done < 27
        run: |
          terraform -chdir=azure    init -input=false
          terraform -chdir=aws      init -input=false
          terraform -chdir=monolith init -input=false

      # ── Run 3 cycles per trigger ──────────────────────────────────────────
      # start-index = cycles already done → picks next 3 faults in catalogue
      # order, wrapping modulo 9, guaranteeing all faults are covered each pass.
      - name: Run fault injection (3 cycles)
        if: steps.count.outputs.done < 27
        run: python inject.py --cycles 3 --start-index ${{ steps.count.outputs.done }}

      # ── Commit CSV back to the repo ───────────────────────────────────────
      - name: Commit data to repo
        if: always() && steps.count.outputs.done < 27
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash --include-untracked
          git pull --rebase origin "$GITHUB_REF_NAME"
          git stash pop || true
          git add data/exp2_fault_injection_*.csv
          if git diff --staged --quiet; then
            echo "No new data produced (inject may have failed before writing)."
          else
            TOTAL=$(python3 - <<'EOF'
          import glob
          files = glob.glob("data/exp2_fault_injection_*.csv")
          total = sum(max(0, sum(1 for _ in open(f)) - 1) for f in files)
          print(total)
          EOF
            )
            git commit -m "data(exp2): fault cycles added — ${TOTAL}/27 total [skip ci]"
            git push origin "$GITHUB_REF_NAME"
            echo "Pushed. Total inject cycles in repo: $TOTAL"
          fi
