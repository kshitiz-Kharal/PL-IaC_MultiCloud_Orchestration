name: Fault Injection — 1 cycle daily (Exp 2)

# Triggers at 07:00 UTC every day — 5 hours after benchmark-daily.yml fires.
# The benchmark cycle (~30 min) always finishes before inject starts, so both
# cannot hold an Azure VPN Gateway at the same time.
#
# Sleeps a random 0–2 hours for the same reason as benchmark-daily.yml.
# Self-skips once 9 cycles are in the repo (one per fault in FAULT_CATALOGUE).
on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION:    ap-southeast-2
  ARM_SUBSCRIPTION_ID:   ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_CLIENT_ID:         ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET:     ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_TENANT_ID:         ${{ secrets.ARM_TENANT_ID }}
  AZURE_VM_PASSWORD:     ${{ secrets.AZURE_VM_PASSWORD }}

jobs:
  inject:
    name: Fault injection cycle
    runs-on: ubuntu-latest
    timeout-minutes: 300    # 120 min sleep + ~90 min inject cycle + buffer

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      # ── Check how many inject cycles are already in the repo ──────────────
      - name: Count existing cycles
        id: count
        run: |
          DONE=$(python3 - <<'EOF'
          import glob
          files = glob.glob("data/exp2_fault_injection_*.csv")
          total = sum(max(0, sum(1 for _ in open(f)) - 1) for f in files)
          print(total)
          EOF
          )
          echo "done=$DONE" >> "$GITHUB_OUTPUT"
          echo "Fault-injection cycles already collected: $DONE / 18"

      - name: Skip if target reached
        if: steps.count.outputs.done >= 18
        run: |
          echo "18 fault-injection cycles already collected (2 passes, all faults covered). Nothing to do."
          exit 0

      # ── Random delay: 0–7199 s (up to 2 hours) ───────────────────────────
      - name: Random start delay
        if: steps.count.outputs.done < 18
        run: |
          DELAY=$((RANDOM % 7200))
          echo "Sleeping ${DELAY}s (~$((DELAY/60)) min) before starting..."
          sleep "$DELAY"

      # ── Tool setup ────────────────────────────────────────────────────────
      - uses: hashicorp/setup-terraform@v3.1.2
        if: steps.count.outputs.done < 18
        with:
          terraform_version: "~1.9"

      - uses: actions/setup-python@v5.3.0
        if: steps.count.outputs.done < 18
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        if: steps.count.outputs.done < 18
        run: pip install -r requirements.txt

      - name: Azure CLI login
        if: steps.count.outputs.done < 18
        run: |
          az login --service-principal \
            -u "$ARM_CLIENT_ID" \
            -p "$ARM_CLIENT_SECRET" \
            --tenant "$ARM_TENANT_ID"

      - name: terraform init
        if: steps.count.outputs.done < 18
        run: |
          terraform -chdir=azure    init -input=false
          terraform -chdir=aws      init -input=false
          terraform -chdir=monolith init -input=false

      # ── Run exactly 1 cycle ───────────────────────────────────────────────
      # start-index = cycles already done, so each daily run picks the next
      # fault in catalogue order — guaranteeing all 9 faults are covered.
      - name: Run fault injection (1 cycle)
        if: steps.count.outputs.done < 18
        run: python inject.py --cycles 1 --start-index ${{ steps.count.outputs.done }}

      # ── Commit CSV back to the repo ───────────────────────────────────────
      - name: Commit data to repo
        if: always() && steps.count.outputs.done < 15
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash --include-untracked
          git pull --rebase origin "$GITHUB_REF_NAME"
          git stash pop || true
          git add data/exp2_fault_injection_*.csv
          if git diff --staged --quiet; then
            echo "No new data produced (inject may have failed before writing)."
          else
            TOTAL=$(python3 - <<'EOF'
          import glob
          files = glob.glob("data/exp2_fault_injection_*.csv")
          total = sum(max(0, sum(1 for _ in open(f)) - 1) for f in files)
          print(total)
          EOF
            )
            git commit -m "data(exp2): fault cycle added — ${TOTAL}/18 total [skip ci]"
            git push origin "$GITHUB_REF_NAME"
            echo "Pushed. Total inject cycles in repo: $TOTAL"
          fi
